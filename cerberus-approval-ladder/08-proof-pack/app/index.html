<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProofPack</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="proofpack">
        <div class="intro">
          <p class="eyebrow">ProofPack</p>
          <h1>Portable receipts for agent work</h1>
          <p>Append-only evidence envelopes, not reputation scores.</p>
        </div>
        <div class="console">
          <button id="submit" type="button">SubmitReceipt</button>
          <button id="correct" type="button">SubmitCorrection</button>
          <pre id="output"></pre>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
