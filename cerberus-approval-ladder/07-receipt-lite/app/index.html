<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReceiptLite</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="receipt">
        <div>
          <p class="eyebrow">ReceiptLite</p>
          <h1>Evidence receipts, missing a market</h1>
        </div>
        <form>
          <label for="summary">Receipt summary</label>
          <textarea id="summary">Readiness check completed for an agent service.</textarea>
          <button id="submit" type="button">SubmitReceipt</button>
          <pre id="output"></pre>
        </form>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
