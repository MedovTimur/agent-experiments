<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TrustScoreOne</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="scoreboard">
        <div>
          <p class="eyebrow">TrustScoreOne</p>
          <h1>One number pretending to be trust</h1>
        </div>
        <div class="score">
          <label for="score">Owner-set score</label>
          <input id="score" type="range" min="0" max="100" value="87" />
          <strong id="value">87</strong>
          <p>No evidence, no methodology, no dispute, no correction record.</p>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
